services:

  # ─── API GATEWAY ────────────────────────────────────────────
  apisix:
    image: apache/apisix:${APISIX_IMAGE_TAG:-3.16.0-debian}
    restart: always
    volumes:
      - ./apisix_conf/config.yaml:/usr/local/apisix/conf/config.yaml
    depends_on:
      - etcd
    ports:
      - "9180:9180/tcp"
      - "9080:9080/tcp"
      - "9091:9091/tcp"
      - "9443:9443/tcp"
      - "9092:9092/tcp"
    networks:
      - apisix

  etcd:
    image: gcr.io/etcd-development/etcd:v3.5.16
    restart: always
    volumes:
      - etcd_data:/etcd-data
    environment:
      ETCD_DATA_DIR: /etcd-data
      ETCD_ENABLE_V2: "true"
      ETCD_ADVERTISE_CLIENT_URLS: "http://etcd:2379"
      ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:2379"
    command:
      - etcd
    ports:
      - "2379:2379/tcp"
    networks:
      - apisix

  # ─── AUTH ───────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    container_name: keycloak
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
    volumes:
      - keycloak_data:/opt/keycloak/data
    command: start-dev
    networks:
      - apisix

  # ─── DATABASES ──────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: ahmet
      POSTGRES_PASSWORD: Ahmet.123
      POSTGRES_DB: NewsIdentityServiceDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - apisix

  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - apisix

  # ─── MESSAGE BROKER ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - apisix

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - apisix

  notification-inbox-worker:
    build:
      context: .
      dockerfile: src/Workers/NotificationInboxWorker/Dockerfile
    image: notification-inbox-worker:latest
    container_name: notification-inbox-worker
    restart: always
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=NotificationServiceDb;Username=ahmet;Password=Ahmet.123
      - Smtp__Host=smtp.gmail.com
      - Smtp__Port=587
      - Smtp__Username=${SMTP_USERNAME}
      - Smtp__Password=${SMTP_PASSWORD}
      - Smtp__FromName=News Portal
    depends_on:
      - postgres
    networks:
      - apisix

  notification-service:
    build:
      context: .
      dockerfile: src/Services/NotificationService/Presentation/NotificationService.WebApi/Dockerfile
    image: notification-service:latest
    container_name: notification-service
    restart: always
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=NotificationServiceDb;Username=ahmet;Password=Ahmet.123
      - Kafka__BootstrapServers=kafka:9092
      - Smtp__Host=smtp.gmail.com
      - Smtp__Port=587
      - Smtp__Username=${SMTP_USERNAME}
      - Smtp__Password=${SMTP_PASSWORD}
      - Smtp__FromName=News Portal
      - Notification__AdminEmail=${SMTP_USERNAME}
    depends_on:
      - postgres
      - kafka
    networks:
      - apisix

  # ─── SEARCH ─────────────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    networks:
      - apisix

  kibana:
    image: kibana:8.13.0
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - apisix

  # ─── MONITORING ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.25.0
    restart: always
    ports:
      - "9090:9090/tcp"
    networks:
      - apisix

  grafana:
    image: grafana/grafana:7.3.7
    restart: always
    ports:
      - "3000:3000"
    networks:
      - apisix

  # ─── SERVICES ───────────────────────────────────────────────
  identity-service:
    build:
      context: .
      dockerfile: src/Services/IdentityService/Presentation/IdentityService.WebApi/Dockerfile
    image: identity-service:latest
    container_name: identity-service
    restart: always
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=NewsIdentityServiceDb;Username=ahmet;Password=Ahmet.123
      - Keycloak__Authority=http://keycloak:8080/realms/news-portal
      - Keycloak__PublicAuthority=http://localhost:8080/realms/news-portal
      - Keycloak__Audience=account
      - Keycloak__RequireHttpsMetadata=false
      - Keycloak__BaseUrl=http://keycloak:8080
      - Keycloak__Realm=news-portal
      - Keycloak__AdminClientId=admin-cli
      - Keycloak__AdminUsername=admin
      - Keycloak__AdminPassword=admin
      - Kafka__BootstrapServers=kafka:9092
    depends_on:
      - postgres
      - kafka
      - keycloak
    networks:
      - apisix

  identity-outbox-worker:
    build:
      context: .
      dockerfile: src/Workers/IdentityOutboxWorker/Dockerfile
    image: identity-outbox-worker:latest
    container_name: identity-outbox-worker
    restart: always
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=NewsIdentityServiceDb;Username=ahmet;Password=Ahmet.123
      - Kafka__BootstrapServers=kafka:9092
    depends_on:
      - postgres
      - kafka
    networks:
      - apisix

  news-outbox-worker:
    build:
      context: .
      dockerfile: src/Workers/NewsOutboxWorker/Dockerfile
    image: news-outbox-worker:latest
    container_name: news-outbox-worker
    restart: always
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=NewsServiceDb;Username=ahmet;Password=Ahmet.123
      - Kafka__BootstrapServers=kafka:9092
    depends_on:
      - postgres
      - kafka
    networks:
      - apisix

  news-service:
    build:
      context: .
      dockerfile: src/Services/NewsService/Presentation/NewsService.WebApi/Dockerfile
    image: news-service:latest
    container_name: news-service
    restart: always
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=NewsServiceDb;Username=ahmet;Password=Ahmet.123
      - Keycloak__Authority=http://keycloak:8080/realms/news-portal
      - Keycloak__PublicAuthority=http://localhost:8080/realms/news-portal
      - Keycloak__Audience=account
      - Keycloak__RequireHttpsMetadata=false
      - Kafka__BootstrapServers=kafka:9092
    depends_on:
      - postgres
      - kafka
      - keycloak
    networks:
      - apisix

networks:
  apisix:
    driver: bridge

volumes:
  etcd_data:
  postgres_data:
  redis_data:
  esdata:
  keycloak_data:

